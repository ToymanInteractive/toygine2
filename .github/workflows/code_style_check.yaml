name: Code style check

on:
  workflow_call:

permissions:
  contents: read
  pull-requests: read

jobs:
  style:
    name: Code style check
    runs-on: ubuntu-slim
    timeout-minutes: 10
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          submodules: recursive
          fetch-depth: 50
          persist-credentials: false

      - name: Setup clang-format
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22
          sudo apt install -y clang-format-22
          sudo update-alternatives --install /usr/bin/clang-format clang-format /usr/bin/clang-format-22 220

      - name: Get changed files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr view "${{ github.event.pull_request.number }}" \
            --json files --jq '.files[].path' > changed_files.txt

      - name: Check code format
        run: |
          bash tools/builder/check_code_format.sh changed_files.txt

      - name: Check code headers
        run: |
          bash tools/builder/check_source_headers.sh changed_files.txt

      - name: Check format of markdown files
        uses: DavidAnson/markdownlint-cli2-action@v24.0.0
        with:
          globs: "**/*.md"
