name: Push

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read
  pull-requests: write
  checks: write

jobs:
  build:
    name: Build using CMake
    uses: ./.github/workflows/build_cmake.yaml
    secrets: inherit
